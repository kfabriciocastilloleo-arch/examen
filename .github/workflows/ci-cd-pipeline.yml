name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  detect-changes:
    name: Detect changed components
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      infra: ${{ steps.filter.outputs.infra }}
      docs-only: ${{ steps.filter.outputs.docs-only }}
      changed-components: ${{ steps.set-matrix.outputs.changed }}

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: dorny/paths-filter@v3.0.2
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            infra:
              - 'infrastructure/**'
            docs-only:
              - 'docs/**'

      - name: Build dynamic matrix
        id: set-matrix
        run: |
          FRONTEND="${{ steps.filter.outputs.frontend }}"
          BACKEND="${{ steps.filter.outputs.backend }}"
          if [ "$FRONTEND" = "true" ] && [ "$BACKEND" = "true" ]; then
            echo 'changed=["frontend","backend"]' >> "$GITHUB_OUTPUT"
          elif [ "$FRONTEND" = "true" ]; then
            echo 'changed=["frontend"]' >> "$GITHUB_OUTPUT"
          elif [ "$BACKEND" = "true" ]; then
            echo 'changed=["backend"]' >> "$GITHUB_OUTPUT"
          else
            echo 'changed=[]' >> "$GITHUB_OUTPUT"
          fi

  validate:
    name: Validate ${{ matrix.component }}
    needs: [detect-changes]
    if: needs.detect-changes.outputs.docs-only != 'true'
    strategy:
      matrix:
        component: ${{ fromJSON(needs.detect-changes.outputs.changed-components) }}
    uses: ./.github/workflows/reusable-validations.yml
    with:
      component: ${{ matrix.component }}
      lint-enabled: true

  test:
    name: Test ${{ matrix.component }} (${{ matrix.os }}, Node ${{ matrix.node-version }})
    needs: [detect-changes]
    if: needs.detect-changes.outputs.docs-only != 'true'
    strategy:
      fail-fast: false
      matrix:
        component: ${{ fromJSON(needs.detect-changes.outputs.changed-components) }}
        os: [ubuntu-latest, windows-latest]
        node-version: ["18", "20", "22"]
    uses: ./.github/workflows/reusable-testing.yml
    with:
      component: ${{ matrix.component }}
      os: ${{ matrix.os }}
      node-version: ${{ matrix.node-version }}
    secrets:
      codecov-token: ${{ secrets.CODECOV_TOKEN }}

  compile:
    name: Build ${{ matrix.component }}
    needs: [detect-changes, test, validate]
    if: needs.detect-changes.outputs.docs-only != 'true'
    strategy:
      matrix:
        component: ${{ fromJSON(needs.detect-changes.outputs.changed-components) }}
    uses: ./.github/workflows/reusable-compilation.yml
    with:
      component: ${{ matrix.component }}
      os: ubuntu-latest
      node-version: "20"

  deploy-staging:
    name: Deploy to staging
    needs: [compile, detect-changes]
    if: github.ref == 'refs/heads/main' && needs.detect-changes.outputs.docs-only != 'true' && (needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.backend == 'true')
    environment:
      name: staging
      url: https://staging.example.com
    runs-on: self-hosted
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4.1.9
        with:
          pattern: build-*
          merge-multiple: true

      - name: Deploy to staging
        run: echo "Deploying to staging environment..."

  deploy-production:
    name: Deploy to production
    needs: [deploy-staging, detect-changes]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://production.example.com
    runs-on: self-hosted
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4.1.9
        with:
          pattern: build-*
          merge-multiple: true

      - name: Deploy to production
        run: echo "Deploying to production environment..."

  report:
    name: Generate pipeline summary
    needs: [detect-changes, test, compile, deploy-staging]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Resolve status messages
        id: status
        run: |
          TEST="${{ needs.test.result }}"
          COMPILE="${{ needs.compile.result }}"
          DEPLOY="${{ needs.deploy-staging.result }}"

          [ "$TEST" = success ] && TS="Passed" || { [ "$TEST" = skipped ] && TS="Skipped (no changes)" || TS="Failed"; }
          [ "$COMPILE" = success ] && CS="Successful" || { [ "$COMPILE" = skipped ] && CS="Skipped (no changes)" || CS="Failed"; }
          [ "$DEPLOY" = success ] && DS="Deployed" || { [ "$DEPLOY" = skipped ] && DS="Skipped (no deploy needed)" || DS="$DEPLOY"; }

          echo "test=$TS" >> "$GITHUB_OUTPUT"
          echo "compile=$CS" >> "$GITHUB_OUTPUT"
          echo "deploy=$DS" >> "$GITHUB_OUTPUT"

      - name: Build summary
        run: |
          cat <<'EOF' >> $GITHUB_STEP_SUMMARY
          # Pipeline Report

          ## Changed Components
          - Frontend: ${{ needs.detect-changes.outputs.frontend }}
          - Backend: ${{ needs.detect-changes.outputs.backend }}
          - Infrastructure: ${{ needs.detect-changes.outputs.infra }}
          - Docs only: ${{ needs.detect-changes.outputs.docs-only }}

          ## Test Results
          ${{ steps.status.outputs.test }}

          ## Build Status
          ${{ steps.status.outputs.compile }}

          ## Deployments
          - Staging: ${{ steps.status.outputs.deploy }}
          EOF

      - name: Upload pipeline report
        uses: actions/upload-artifact@v4.6.1
        with:
          name: pipeline-report-${{ github.sha }}
          path: ${{ github.workspace }}
          if-no-files-found: ignore
