name: Reusable - Validations

on:
  workflow_call:
    inputs:
      component:
        required: true
        type: string
      os:
        required: false
        type: string
        default: ubuntu-latest
      lint-enabled:
        required: false
        type: boolean
        default: true
      format-enabled:
        required: false
        type: boolean
        default: false
    outputs:
      lint-status:
        description: "Lint execution status"
        value: ${{ jobs.lint.outputs.status }}

permissions:
  contents: read

jobs:
  lint:
    name: Lint ${{ inputs.component }}
    runs-on: ${{ inputs.os }}
    outputs:
      status: ${{ steps.run-lint.outcome }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4.1.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ inputs.component }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ inputs.component }}

      - name: Run lint
        if: inputs.lint-enabled
        id: run-lint
        run: npm run lint
        working-directory: ${{ inputs.component }}

      - name: Check formatting
        if: inputs.format-enabled
        run: npx prettier --check .
        working-directory: ${{ inputs.component }}
