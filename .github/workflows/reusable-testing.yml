name: Reusable - Testing

on:
  workflow_call:
    inputs:
      component:
        required: true
        type: string
      os:
        required: false
        type: string
        default: ubuntu-latest
      node-version:
        required: false
        type: string
        default: "20"
    outputs:
      test-status:
        description: "Test execution status"
        value: ${{ jobs.test.outputs.status }}
    secrets:
      codecov-token:
        required: false

permissions:
  contents: read
  checks: write

jobs:
  test:
    name: Test ${{ inputs.component }}
    runs-on: ${{ inputs.os }}
    outputs:
      status: ${{ steps.run-tests.outcome }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4.1.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.component }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ inputs.component }}

      - name: Run tests
        id: run-tests
        run: npm test
        working-directory: ${{ inputs.component }}

      - name: Upload coverage
        if: inputs.component == 'backend'
        uses: codecov/codecov-action@v5.3.1
        with:
          token: ${{ secrets.codecov-token }}
          directory: ${{ inputs.component }}/coverage
